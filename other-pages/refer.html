<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            background: whitesmoke;
            font-family: 'Times New Romans';
            color: white;
            position: relative;   

        }
        .box{
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 15px 30px;
            display: flex;
             align-items: center;
             justify-content: space-between;
             background-color: darkblue;
             backdrop-filter: blur(280px);
        }
        .image{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 40px 20px;
            margin-top: 120px;
        }
        .a{
            margin: 20px;
           padding: 10px;
           border-radius: 10px;

           transition: transform 0.3s ease;
           box-shadow: 6px 3px 10px 10px rgba(7, 0, 94, 0.7);
           background:rgb(190, 189, 189) ;
        }
        .a:hover{
            transform: translateY(-4px);
        }

        img{
            object-fit: cover;
            border-radius: 28px;
            width: 100%;
            height: 800px;

        }

        
    </style>
</head>
<body>
    <span class="box">
    <div> <h3> <br> 👋 <br>🌸 WELCOME!🌸<br></h3></div>
    <div><h3>✨ The previous link leads you here.✨</h3></div>
    </span>

    <section class="image">
        <div class="a">
           <img src="../images/Team.jpg"  > 
        </div>

       <div class="a">
        <img src="../images/group.jpg" >
       </div>
      
       <div class="a">
           <img src="../images/be.jpg">
       </div>


        <div class="a">
           <img src="../images/developer.jpg">
        </div>

    </section>
     
</body>
</html>
