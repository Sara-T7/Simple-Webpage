<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

body{
    background: linear-gradient(to bottom, #0f172a, #1e293b);
}

/* container */
.container{
   background: #ffffff;
   border: 4px solid #1e293b;
   padding:20px;
   margin: 20px 20px;
   text-align: center;
   display: flex;
   flex-direction: column;
   height: 100vh;
   font-family: 'Inter', 'Courier New', monospace;
  color:#f0e0e0;
  font-size: 2rem;
  padding-top: 40px;
}


/* top */
.top{
  display: flex;
  padding: 8px;
  border: 6px solid  #1e293b;
  margin-bottom: 40px;
  justify-content: space-between;
}
/* top boxes */
.box{
  margin: 0 10px;
  flex: 1;
  background: #284c87;
  color:#ffffff;
  border: 2px solid #1e40af;
  height: 60px;
  transition: all 0.3s ease;
}

.box:hover{
  transform: translateY(-3px);
}

/* middle-two */
.middle-two{
  display: flex;
  flex: 1;
  margin: 0 10px;
}

.middle-two div{
  flex: 1;
  border: 2px solid #4338ca;
  background: #25266f;
  margin: 0 5px;
  color:#ffffff;
  transition: all 0.3s ease;
}

.middle-two div:hover{
  transform: translateY(-3px);
}

/* middle */
.middle{
  display: flex;
  margin-bottom: 40px;
  border: 6px solid  #1e293b;
  padding: 8px;
}

.left{
  background: #2c257b;
  color:#ffffff;
  border: 2px solid #065f46;
  flex: 2;
  height: 150px;
  margin-right: 10px;
  transition: all 0.3s ease;
}

.left:hover{
  transform: translateY(-3px);
}

.right{
  display: flex;
  flex:2;
  flex-direction: column;
}

.right div{
  flex: 2;
  color:#ffffff;
  border: 2px solid #1e293b;
  margin-bottom: 10px;
  transition: all 0.3s ease;
}

.right div:hover{
  transform: translateY(-3px);
}

.right div:first-child {
  background:#706248;
  color:#1f2937;
}

.right div:last-child {
  margin-bottom: 0;
  background: #4d5157;
}

/* bottom */
.bottom{
  display: flex;
  border: 6px solid  #1e293b;
  justify-content: space-between;
  padding: 8px;
  margin-bottom: 40px;
}

.bottom .large{
  flex:1;
  height: 90px;
  background:#475569;
  margin: 0 10px;
  color:#ffffff;
  border: 2px solid #1e293b;
  transition: all 0.3s ease;
}

.bottom .large:hover{
  transform: translateY(-3px);
}

.bottom .small {
  flex:1;
  background:#48576c;
  color:#0f172a;
  border: 2px solid #475569;
  margin: 0 10px;
  transition: all 0.3s ease;
}

.bottom .small:hover{
  transform: translateY(-3px);
}

    


    </style>
    
</head>
<body>
   
  <div class="container">
    <!-- top -->
    <div class="top">

      <div  class="box">1</div>

      <div class="middle-two">
      <div><em>2.1</em></div>
      <div><em>2.2</em></div>
      </div>

      <div class="box"> 3</div>

    </div>
    <!-- middle -->
    <div class="middle">

     <div class="left">Big box</div>

     <div class="right">
      <div><strong>upper</strong></div>
      <div>lower</div>
      </div>

    </div>
  <!-- bottom -->
   <div class="bottom">
    <div class="large"><em>one</em></div>
  
    <div class="small"><em>one-two</em></div>
    <div class="small"><em>one-three</em></div>


    <div class="large">two</div>
    
  </div>
  </div>
  <br>  
</body>
</html>
