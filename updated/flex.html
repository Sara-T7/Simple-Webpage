<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

body{
    background: black;
    font-family: 'Times New Roman';
}
.container{
   background: linear-gradient(to right, rgb(10, 134, 134), #7dcdd1);
   border: 6px solid #3d3d5f;
   padding:20px;
   margin: 20px 20px;
   text-align: center;
   display: flex;
   flex-direction: column;
   height: 100vh;
 }
.container:hover{
   background:rgb(29, 168, 168);
  /* transform: scale(1.01); */
}
.top{
  display: flex;
  padding: 8px;
  border: 10px solid  #3d3d5f;
  margin-bottom:  20px;
  justify-content: space-between;;
}
.box{
  margin: 0 10px;
  flex: 1;
  background: rgb(92, 92, 211);
  color:white;
  border: 4px solid rgb(27, 86, 27);
  height: 60px;

}
.middle-two{
  display: flex;
  flex: 1;
  margin: 0 10px;
  
}
.middle-two div{
  flex: 1;
  border: 4px solid rgb(27, 86, 27);
  background: rgb(201, 90, 235);
  margin: 0 5px;
  color:white;
}
/* middle */
.middle{
  display: flex;
  margin-bottom: 20px;
  border: 10px solid  #3d3d5f;
  padding: 8px;

}
.left{
  background: green;
  color:white;
  border: 4px solid gray;
  flex: 2;
  height: 150px;
  margin-right: 10px;
}
.right{
  display: flex;
  flex:2;
  flex-direction: column;
  /* justify-content: space-between; */
}
.right div{
  flex: 2;
  color:white;
  border: 4px solid gray;
  margin-bottom:  10px;
}
.right div:first-child {
  background:yellow;
  color: red;
}

 .right div:last-child {
  margin-bottom: 0;
  background: red;
 }
  /* bottom */
.bottom{
  display: flex;
  border: 10px solid  #3d3d5f;
  justify-content: space-between;
  padding: 8px;
}
.bottom .large{
  flex:1;
  height: 90px;
  background:  grey;
  margin: 0 10px;
  color: white;
  border: 4px solid black;

}

.bottom .small {
  flex:1;
  background: silver;
  color: white;
  border: 4px solid black;
  margin: 0 10px;
}

    


    </style>
    
</head>
<body>
   
  <div class="container">
    <!-- top -->
    <div class="top">

      <div  class="box">1</div>

      <div class="middle-two">
      <div><em>2.1</em></div>
      <div><em>2.2</em></div>
      </div>

      <div class="box"> 3</div>

    </div>
    <!-- middle -->
    <div class="middle">

     <div class="left">Big box</div>

     <div class="right">
      <div><strong>upper</strong></div>
      <div>lower</div>
      </div>

    </div>
  <!-- bottom -->
   <div class="bottom">
    <div class="large"><em>one</em></div>
  
    <div class="small"><em>one-two</em></div>
    <div class="small"><em>one-three</em></div>


    <div class="large">two</div>
    
  </div>
  </div>
  <br>  
</body>
</html>
